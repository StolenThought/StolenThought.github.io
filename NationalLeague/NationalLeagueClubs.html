<!DOCTYPE html>
<html>
<head>
  <title>National League Stats</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('Background.jpg') no-repeat fixed;
      background-size: cover;
      color: white;
      text-align: center;
      margin: 0;
    }

    nav {
      background-color: #0a0a0a;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    nav a, .dropdown .dropbtn {
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      margin: 0 6px;
      transition: background 0.3s ease, transform 0.2s ease;
      background-color: transparent;
    }

    nav a:hover, .dropdown:hover .dropbtn {
      background-color: #1d4ed8;
      transform: translateY(-2px);
    }

    nav a.active {
      background-color: white;
      color: black;
    }

	.dropdown {
      position: relative;
	  top: 12px;
    }

    .dropdown-content, .dropdown-submenu-content {
	  top: 100%;
      display: none;
      position: absolute;
      background-color: #1a1a1a;
      min-width: 200px;
      border-radius: 6px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
      z-index: 1;
    }

    .dropdown:hover .dropdown-content,
    .dropdown-submenu:hover .dropdown-submenu-content {
      display: block;
    }

    .dropdown-content a {
      color: white;
      padding: 12px 18px;
      text-align: left;
      display: block;
      border-bottom: 1px solid #333;
    }

    .dropdown-content a:hover {
      background-color: #2a72b8;
    }

    .dropdown-submenu {
      position: relative;
    }

    .dropdown-submenu-content {
      top: 0;
      left: 100%;
      margin-left: 1px;
    }

    .caret, .caret-active {
      display: inline-block;
      margin-left: 4px;
      vertical-align: middle;
      border-top: 5px solid #fff;
      border-right: 5px solid transparent;
      border-left: 5px solid transparent;
    }

    .caret-active {
      border-top-color: #000;
    }

    header {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 20px;
    }

    section {
      background-color: rgba(0, 0, 0, 0.7);
      margin: 20px auto;
      padding: 20px;
      max-width: 800px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    th, td {
      border: 1px solid white;
      padding: 10px;
    }

    th {
      background-color: #2a72b8;
    }

    .season-section { display: none; }
    .season-section.active { display: block; }

    .scrollable {
      height: 586px;
      overflow-y: scroll;
    }

    .sticky th {
      position: sticky;
      top: 0;
      background-color: #2a72b8;
    }

    .season-nav {
      background: #111;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .season-nav select {
      background: #2a72b8;
      color: white;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .season-nav select option {
      background: #111;
      color: white;
    }
  </style>
</head>
